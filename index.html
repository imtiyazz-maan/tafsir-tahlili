<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>امتياز - التفسير التحليلي</title>
    <style>
        :root { 
            --primary: #1e4d2b; --accent: #c5a059; --success: #27ae60; --light: #fdfdfd;
            --bg-body: #f0f2f0; --bg-container: #ffffff; --text-main: #333333;
            --input-bg: #ffffff; --input-border: #eeeeee;
        }
        body.dark-mode {
            --bg-body: #121212; --bg-container: #1e1e1e; --text-main: #e0e0e0;
            --input-bg: #2d2d2d; --input-border: #444444; --primary: #7ee2a8;
            --accent: #d8b36a;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-body); 
            color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; 
        }
        .container { 
            background: var(--bg-container); width: 100%; max-width: 700px; padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid var(--accent); position: relative; 
            display: flex; flex-direction: column;
        }

        .header-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
            width: 100%;
        }
        
        .lang-dropdown {
            position: absolute;
            top: 15px;
            left: 15px;
            display: inline-block;
            z-index: 100;
        }
        
        .theme-toggle-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--bg-container);
            color: var(--text-main);
            padding: 6px 10px;
            font-size: 0.8rem;
            border: 1px solid var(--accent);
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
        }

        .dropbtn {
            background: var(--bg-container);
            color: var(--text-main);
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid var(--accent);
            border-radius: 5px;
            cursor: pointer;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            left: 0;
            background-color: var(--bg-container);
            min-width: 90px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            border-radius: 5px;
            border: 1px solid var(--input-border);
            margin-top: 5px;
            overflow: hidden;
        }
        .dropdown-content button {
            color: var(--text-main);
            padding: 8px 12px;
            display: block;
            background: none;
            border: none;
            width: 100%;
            text-align: center;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .dropdown-content button:hover {
            background-color: rgba(197, 160, 89, 0.2);
        }
        .show { display: block; }

        .brand { text-align: center; }
        .brand h1 { color: var(--primary); margin: 0; font-size: 2.2rem; }
        
        input, select { width: 100%; padding: 12px; border: 2px solid var(--input-border); background: var(--input-bg); color: var(--text-main); border-radius: 10px; box-sizing: border-box; font-family: inherit; margin-bottom: 10px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; margin-top: 10px; transition: 0.3s; }
        .btn-start { background: #2c3e50; color: white; }
        .btn-reveal { background: var(--accent); color: white; }
        .btn-correct { background: var(--success); color: white; }
        .btn-wrong { background: #e74c3c; color: white; }
        
        #timer-container { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 15px; overflow: hidden; display: none; }
        #timer-bar { width: 100%; height: 100%; background: var(--accent); transition: width 1s linear; }

        .settings-box { background: rgba(0,0,0,0.05); padding: 15px; border-radius: 15px; margin: 15px 0; display: flex; flex-wrap: wrap; gap: 20px; align-items: center; justify-content: center; }
        
        .switch-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--success);
        }
        input:checked + .slider:before {
            transform: translateX(20px);
        }
        body[lang="ar"] input:checked + .slider:before {
            transform: translateX(-20px);
        }
        body[lang="ar"] .slider:before {
            left: auto;
            right: 3px;
        }

        #quiz-section, #result-section { display: none; text-align: center; }
        .answer-box { background: rgba(197, 160, 89, 0.1); border-right: 6px solid var(--accent); padding: 20px; margin-top: 20px; display: none; text-align: right; border-radius: 10px; }
        .eval-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        
        body[lang="id"], body[lang="en"] { direction: ltr; text-align: left; }
        body[lang="ar"] { direction: rtl; text-align: right; }
        body[lang="id"] .answer-box, body[lang="en"] .answer-box {
            border-right: none;
            border-left: 6px solid var(--accent);
            text-align: left;
        }

        body.dark-mode .settings-box {
            background: rgba(255,255,255,0.05);
        }

        body.dark-mode .answer-box {
            background: rgba(216, 179, 106, 0.12);
        }

        body.dark-mode #q-text,
        body.dark-mode #display-maddah-name,
        body.dark-mode .brand h1,
        body.dark-mode .answer-box,
        body.dark-mode .answer-box p,
        body.dark-mode .answer-box strong {
            color: #ffffff !important;
            font-weight: bold;
        }
    </style>
</head>
<body lang="ar">

<div id="setup-section" class="container">
    <div class="header-wrapper">
        <div class="lang-dropdown">
            <button onclick="toggleLangMenu()" class="dropbtn" id="current-lang-btn">🌐 AR</button>
            <div id="langDropdown" class="dropdown-content">
                <button onclick="changeLang('id')">ID</button>
                <button onclick="changeLang('en')">EN</button>
                <button onclick="changeLang('ar')">AR</button>
            </div>
        </div>
        
        <button class="theme-toggle-btn" id="dark-toggle" onclick="toggleDarkMode()">🌙</button>

        <div class="brand">
            <h1 id="txt-title">امتياز</h1>
            <p id="txt-subtitle">Platform Murojaah Mandiri</p>
        </div>
    </div>
    
    <div style="text-align: center; background: rgba(197, 160, 89, 0.05); padding: 20px; border-radius: 15px; margin-bottom: 15px;">
        <span id="txt-fixed-label" style="font-size: 0.9rem; opacity: 0.7;">المادة الحالية / Maddah:</span>
        <h2 id="display-maddah-name" style="margin: 5px 0 0 0; color: var(--primary); font-size: 1.6rem;">...</h2>
    </div>
    
    <div class="settings-box">
        <div class="switch-container" onclick="document.getElementById('timer-toggle').click();">
            <span id="txt-timer-on" style="font-weight: bold;">تفعيل المؤقت</span>
            <label class="switch" onclick="event.stopPropagation();">
                <input type="checkbox" id="timer-toggle" checked>
                <span class="slider"></span>
            </label>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <span id="txt-timer-sec">المدة (ثانية):</span>
            <input type="number" id="timer-duration" value="30" min="5" style="width: 70px; margin: 0; padding: 5px;">
        </div>
    </div>

    <div style="text-align: center;">
        <p id="count-info" style="font-weight: bold; font-size: 1.1rem; margin-bottom: 15px;">...</p>
        <button id="start-btn" class="btn btn-start" onclick="startQuiz()">ابدأ التدريب</button>
    </div>
</div>

<div id="quiz-section" class="container">
    <div id="timer-container"><div id="timer-bar"></div></div>
    <p id="progress"></p>
    <h2 id="q-text" style="line-height: 1.6; min-height: 60px; color: var(--primary);"></h2>
    <button id="reveal-btn" class="btn btn-reveal" onclick="revealAnswer()">إظهار الإجابة</button>
    <div id="answer-container" class="answer-box"><strong id="txt-label-ans">الإجابة الشارحة:</strong><p id="a-text" style="font-size: 1.1rem; margin-top: 10px; line-height: 1.6; white-space: pre-line;"></p></div>
    <div id="eval-section" class="eval-btns" style="with:none;">
        <button class="btn btn-wrong" id="txt-btn-wrong" onclick="processResult(false)">نسيت</button>
        <button class="btn btn-correct" id="txt-btn-correct" onclick="processResult(true)">حفظت</button>
    </div>
</div>

<div id="result-section" class="container">
    <h2 id="txt-res-title">النتيجة النهائية</h2>
    <p id="score-text" style="font-size: 3rem; font-weight: bold; color: var(--primary);"></p>
    <button class="btn btn-start" id="txt-btn-restart" onclick="location.reload()">العودة</button>
</div>

<script>
    const NAMA_MADDAH = "التفسير التحليلي";

    const DAFTAR_SOAL = [
      // --- FOTO 1: SURAH AL-FATIHAH (BAGIAN 1) ---
      {
        q: "(Al-Fatihah : 1-7) اذكر أسماء سورة الفاتحة، وهل سورة الفاتحة مكية أو مدنية؟",
        a: "أسماء سورة الفاتحة:\nسورة الكنز، الوافية، الكافية، الشافية، الشفاء، السبع المثاني، النور، الراقية، سورة الحمد والشكر والدعاء، تعليم المسألة.\n\nمكان النزول:\nنزلت في مكة على قول الأكثر والأصح. وقال مجاهد: مدنية. وقيل: نزلت مرتين."
      },
      {
        q: "(Al-Fatihah : 1-7) هل البسملة آية من الفاتحة، ومن كل سورة، اذكر أقوال العلماء في ذلك؟",
        a: "أقوال العلماء في البسملة:\n١. القول الأول: آية من الفاتحة، وعليه قراء مكة والكوفة وابن مبارك والشافعي.\n٢. القول الثاني: ليست منها، وعليه قراء المدينة والبصرة والشام والأوزاعي ومالك.\n\nأما في أوائل السور الأخرى: فهي آية من كل سورة عند الشافعية."
      },
      {
        q: "(Al-Fatihah : 1-7) مما اشتق لفظ الاسم؟ هل الاسم هو المسمى؟",
        a: "الاشتقاق والأصل:\n- مشتق من 'السمو' وهو العلو، وقيل: من 'الوسم' وهو العلامة.\n\nهل الاسم هو المسمى؟\n- إن أُريد به اللفظ فغير المسمى.\n- وإن أُريد به ذات الشيء فهو المسمى.\n- وإن أُريد به الصفة فثلاثة: نفس المسمى وغيره وليس هو ولا غيره."
      },
      {
        q: "(Al-Fatihah : 1-7) مما اشتق كلمة 'إله'؟",
        a: "لفظ الجلالة (إله):\nهو كل معبود بحق أو باطل ثم غلب على المعبود بحق. وهو أصل بنفسه غير مأخوذ من شيء. وقيل: مأخوذ من 'أَلَهَ' إذا تحيّر، وقيل غير ذلك."
      },
      {
        q: "(Al-Fatihah : 1-7) ما معنى الرحمة؟ وما الحكمة من تقديم 'الرحمن' على 'الرحيم'؟",
        a: "معنى الرحمة:\nهي رقة القلب تقتضي التفضل والإحسان.\n\nالحكمة من تقديم (الرحمن) على (الرحيم):\nلأنه اسم خاص إذ لا يقال لغير الله، والخاص مقدم على العام. وليس الترتيب هنا من باب الترقي، بل هو من باب التعميم والتكميل، وللمحافظة على رؤوس الآية."
      },
      {
        q: "(Al-Fatihah : 1-7) هل الرحمن مصروف أو لا？",
        a: "في صرف (الرحمن) قولان عند التفتازاني:\n١. ممنوع من الصرف: بما هو الغالب من نظائره في الزيادة والوصف (على وزن فَعْلان).\n٢. مصروف: بالأصل في مطلق الاسم وهو الصرف."
      },

      // --- FOTO 2: SURAH AL-FATIHAH (BAGIAN 2) ---
      {
        q: "(Al-Fatihah : 1-7) ما حكم الوقف على لفظ الجلالة 'الله' في 'بسم الله'؟",
        a: "الوقف على لفظ الجلالة 'الله' في هذا الموضع قبيح."
      },
      {
        q: "(Al-Fatihah : 1-7) ما معنى 'الحمد'، وما الفرق بينه وبين 'الشكر'، و 'المدح'؟",
        a: "الفروق اللغوية الدقيقة:\n- الحمد لغة: الثناء باللسان على الجميل الاختياري على قصد التبجيل أي: التعظيم.\n- الفرق بين الحمد والمدح: الحمد يكون على الاختياري، أما المدح فيكون على الاختياري وغيره (كالجمال الخِلْقي).\n- الفرق بين الحمد والشكر: الحمد يكون باللسان ولا يختص على الإنعام، أما الشكر فيكون في مقابل الإنعام ولا يختص باللسان (يكون بالقلب والجوارح أيضاً)."
      },
      {
        q: "(Al-Fatihah : 1-7) ما إعراب 'الحمد لله'، وما معنى اللام في 'لله'؟",
        a: "صيغة (الحمد لله):\nهي جملة خبرية لفظاً، إنشائية معنى. وقيل: خبرية لفظاً ومعنى.\n\nمعنى اللام في (لله):\nتأتي للملك، والاستحقاق، والاختصاص، وقيل: للتعليل."
      },
      {
        q: "(Al-Fatihah : 1-7) ما معنى 'العالمين' لغة، ثم اذكر أقوال العلماء في تفسيرها في الآية الكريمة؟",
        a: "معنى العالمين:\nهو اسم جمع 'عَالَم' وليس جمعاً سالماً له، وذهب كثير إلى أنه جمع عَالَم.\n\nأقوال العلماء في تفسيره:\n- ذهب أبو الحسن إلى أنه: أصناف الخلق العقلاء وغيرهم.\n- ذهب أبو عبيدة إلى أنه: أصناف العقلاء فقط.\n- وقيل: هو الإنسان خاصة."
      },
      {
        q: "(Al-Fatihah : 1-7) اذكر القراءات الواردة في قوله: 'مالك'؟",
        a: "القراءات المتواترة في الآية:\n١. قراءة عاصم والكسائي: (مَالِكِ).\n٢. قراءة الباقين من القراء السبعة: (مَلِكِ)."
      },
      {
        q: "(Al-Fatihah : 1-7) كيف ساغ وقوع اسم الفاعل 'مالك' صفة للمعرفة مع أنه نكرة؟",
        a: "حكم إضافة اسم الفاعل هنا:\n- إذا أُريد باسم الفاعل الحال أو المستقبل كانت الإضافة غير حقيقية (لفظية).\n- وإذا قُصد به معنى الاستمرار والثبوت أزلًا وأبدًا كانت الإضافة حقيقية (محضة)، وبها يكتسب التعريف فصحّ وقوعه صفة للمعرفة."
      },
      {
        q: "(Al-Fatihah : 1-7) لِمَ قدمت العبادة على الاستعانة، ولم عدل عن لفظ الغيبة إلى لفظ الخطاب في 'إياك نعبد'؟",
        a: "أسرار النظم والبلاغة في الآية:\n١. لتوافق رؤوس الآي.\n٢. لمعرفة أن تقديم الوسيلة (العبادة) على طلب الحاجة (الاستعانة) أدعى إلى الإجابة.\n٣. لنسبة المتكلم العبادة إلى نفسه أوهم ذلك نوعاً واعتداداً منه، فعقّبها بالاستعانة ليعلم أن العبادة لا تتم ولا تتيسر إلا بمعونة منه وتوفيق.\n٤. لتحسين الكلام وتنشيط السامع ليكون أكثر إصغاءً للكلام (الالتفات من الغيبة إلى الخطاب)."
      },
      {
        q: "(Al-Fatihah : 1-7) ما معنى الاستعانة، وما أقسامها، ولم أطلقت، ولم قدم المفعول؟",
        a: "تحقيق الاستعانة وتقديم المفعول:\n- معنى الاستعانة: طلب معونة.\n- أقسامها وحاجتها: قد تكون ضرورية أو غير ضرورية.\n- سبب الإطلاق: لتناول طلب المعونة في المهمات كلها أو في أداء العبادات.\n- فائدة تقديم المفعول (إياك): للتعظيم والاهتمام والدلالة على الحصر والقصر."
      },
      {
        q: "(Al-Fatihah : 1-7) ما أنواع الهداية؟",
        a: "مراتب وأنواع الهداية:\n١. إفاضة القوي، يتمكن به المؤمن من الارتقاء إلى مصالحه.\n٢. نصب الدلائل الفارقة بين الحق والباطل والصلاح والفساد.\n٣. إرسال الرسل وإنزال الكتب إليها.\n٤. كشف قلوب الرسل السرائر وإراء الأشياء لهم."
      },
      {
        q: "(Al-Fatihah : 1-7) اذكر القراءات الواردة في قوله: 'الصراط'؟",
        a: "القراءات الواردة في لفظ (الصراط):\n١. حمزة وخلف: بالإشمام (خلط صوت الصاد بالزاي).\n٢. قنبل: بالسين الخالصة (السراط).\n٣. الباقون: بالصاد الخالصة (الصراط)."
      },
      {
        q: "(Al-Fatihah : 1-7) ما إعراب 'صراط'، وما العامل فيه؟",
        a: "إعراب (صراطَ الذين):\nيعرب 'بدل كل من كل' (بدل مطابق).\n\nالعامل فيه:\n- مذهب الجمهور: العامل فيه مقدر.\n- مذهب سيبويه: العامل فيه هو نفس العامل في المبدل منه (اهدنا)."
      },
      {
        q: "(Al-Fatihah : 1-7) من هم المنعم عليهم؟ اذكر أقوال العلماء في المراد بـ 'المغضوب عليهم' و 'الضالين'؟",
        a: "المراد بالمنعم عليهم:\nالأنبياء والملائكة والصديقون والشهداء والصالحون. وقيل: الأنبياء خاصة، وقيل: أصحاب موسى وعيسى قبل التحريف والنسخ.\n\nالمغضوب عليهم والضالون:\nاليهود والنصارى، وقيل: الكفار والمنافقون."
      },
      {
        q: "(Al-Fatihah : 1-7) كيف صح أن يقع 'غير' صفة للمعرفة، وهو لا يتعرف وإن أضيف إلى المعارف؟",
        a: "صحة وقوع (غير) صفة للمؤمنين المعرفة بأحد تأويلين:\n١. إجراء الموصول مجرى النكرة.\n٢. جعل كلمة 'غير' معرفة بالإضافة ."
      },
      {
        q: "(Al-Fatihah : 1-7) اذكر القراءات الواردة في 'عليهم'؟",
        a: "قراءات لفظ (عليهم):\n١. حمزة: بضمة الهاء وقفاً ووصلاً (علَيْهُم).\n٢. ابن كثير: بضم الهاء في الوصل خاصة.\n٣. قالون: بالتخيير بين وصل الميم بواو أو لا (عليهمُ / عليهمْ).\n٤. ورش: بوصل الميم بواو إن كان بعدها همزة قطع."
      },
      {
        q: "(Al-Fatihah : 1-7) ما حكم قراءة 'آمين' بعد الانتهاء من قراءة الفاتحة؟ هل آمين من القرآن؟ ما حكم تأمين الإمام في الصلاة بعد قراءة الفاتحة؟",
        a: "أحكام لفظ (آمين):\n١. حكمها: سنة.\n٢. هل هي من القرآن: ليست من القرآن.\n٣. في الصلاة الجهرية: يجب قراءته في الجهرية (أي يسن جهرًا)، وقيل: لا يقوله الإمام، وقيل: يخفيه."
      },
      {
        q: "(Al-Fatihah : 1-7) اذكر بعض الأحاديث الواردة في فضل سورة الفاتحة؟",
        a: "الأسانيد والروايات الواردة في فضلها:\n١. ما روي عن أبي هريرة رضي الله عنه.\n٢. ما روي عن ابن عباس رضي الله عنهما.\n٣. ما روي عن حذيفة بن اليمان رضي الله عنه."
      },

      // --- FOTO 3: SURAH AL-BAQARAH (BAGIAN 1) ---
      {
        q: "(Al-Baqarah : 1-5) كم عدد آيات سورة البقرة؟ هل سورة البقرة مكية أو مدنية？",
        a: "تفصيل السورة:\n- نزولها: مدنية.\n- عدد آياتها: ٢٨٧ آية."
      },
      {
        q: "(Al-Baqarah : 1-5) اذكر أقوال العلماء في الحروف المقطعة، وما إعرابها؟",
        a: "أقوال العلماء في (الم):\n- الشعبي وأبو بكر وعلي وداود بن أبي هند: هي سر القرآن وصفوته، ومن المتشابه الذي استأثر الله بعلمه.\n- وقيل في معناها: 'أنا الله أعلم'.\n- وقيل: هي أسماء السور.\n- وقيل: أسماء للقرآن الكريم."
      },
      {
        q: "(Al-Baqarah : 1-5) لِمَ صحت الإشارة بـ 'ذلك' إلى ما ليس ببعيد؟",
        a: "أوجه الإشارة بـ (ذلك الكتاب):\n١. وقعت الإشارة فيه للتعظيم لرفعة شأنه.\n٢. وقيل: الإشارة إلى 'الم' بعد ما سبق التكلم به وتقضى، فالمنقضي في حكم المتباعد.\n٣. وقيل: ذلك الكتاب الموعود إنزاله في الكتب المتقدمة.\n٤. وقيل: ليعلم أن هذا المنزل هو ذلك الكتاب المثبت في اللوح المحفوظ."
      },
      {
        q: "(Al-Baqarah : 1-5) ما معاني 'الكتاب' في القرآن الكريم؟",
        a: "يرد لفظ الكتاب في اللغة والشرع على معانٍ منها:\nالفرض، الحجة والبرهان، الأجل، ومكاتبة السيد رقيقه."
      },
      {
        q: "(Al-Baqarah : 1-5) ما المراد بـ 'الريب'؟ ولم نفى 'الريب' عن القرآن الكريم بقوله: 'لا ريب فيه'، مع وجود مرتابين فيه؟",
        a: "معنى ونفي الريب:\n- الريب: مصدر 'رابني الشيء' إذا أحدث فيك الريبة، وهي قلق النفس واضطرابها، وسمي به الشك.\n\nتوجيه النفي:\nالمنفي هو كونه متعلقاً بالريب ومظنة له لعلو وضوحه وبرهانه، وقيل: هو خبر بمعنى النهي (أي لا ترتابوا فيه)."
      },
      {
        q: "(Al-Baqarah : 1-5) اذكر مراتب التقوى؟",
        a: "مراتب التقوى الثلاث:\n١. التوقي من العذاب Mخلد بالتبري عن الشرك.\n٢. التجنب عن كل ما يؤثم من فعل الحرام وترك الواجب.\n٣. التنزه عما يشغل سره عن الحق تعالى بالكلية."
      },
      {
        q: "(Al-Baqarah : 1-5) ما معنى الإيمان لغة وشرعاً؟ وما القراءات الواردة في قوله: 'يؤمنون'؟",
        a: "تعريف الإيمان وقراءته:\n- لغة: التصديق.\n- شرعاً: التصديق وحده وهذا هو الأصح، وقيل: التصديق بما علم بالضرورة أنه من دين محمد ﷺ.\n\nالقراءات الواردة في (يؤمنون):\n- ورش والسوسي: بإبدال الهمزة الساكنة واواً (يُومِنون).\n- حمزة: كذلك في حالة الوقف خاصة."
      },
      {
        q: "(Al-Baqarah : 1-5) ما المراد بقوله: 'ويقيمون الصلاة'، وما معنى 'الصلاة' لغة وشرعاً؟",
        a: "معنى إقامة الصلاة:\nيديمونها ويحافظون عليها في مواقيتها بحدودها وأركانها وهيئاتها الشريفة.\n\nالتعريف المعتمد:\n- لغة: الدعاء.\n- شرعاً: اسم لأفعال وأقوال مخصوصة مفتتحة بالتكبير مختتمة بالتسليم."
      },
      {
        q: "(Al-Baqarah : 1-5) اذكر أقوال العلماء في المراد بـ 'النفقة' في الآية، ومما معنى الرزق لغة وعرفاً؟",
        a: "النفقة والرزق:\n- المراد بالإنفاق: إخراج المال في طاعة الله فرضاً كان أو نفلاً، وقيل: هي الزكاة المفروضة. ويحتمل أن يراد به الإنفاق مما منحهم الله من النعم الظاهرة والباطنة.\n\nمعنى الرزق:\n- بالكسر لغة: الحظ.\n- بالفتح لغة: مصدر بمعنى إعطاء الحظ.\n- عرفاً: اسم لكل ما ينتفع به."
      },
      {
        q: "(Al-Baqarah : 1-5) هل الرزق يتناول الحلال والحرام؟ بين أقوال العلماء في ذلك؟",
        a: "أقوال العلماء في ماهية الرزق:\n- المعتزلة: الرزق لا يتناول الحرام مطلقاً؛ مستدلين بمنع الله تعالى العبد من الانتفاع به.\n- أهل السنة: الرزق يتناول الحلال والحرام معاً؛ لشمول لفظ الرزق وعمومه لكل ما ينتفع به الحيوان."
      },
      {
        q: "(Al-Baqarah : 1-5) لِمَ أدخلت 'من' التبعيضية على قوله: 'رزقناهم'؟",
        a: "فائدة دخول (مِن) التبعيضية:\nللكف عن الإسراف المنهي عنه في حق من لم يصبر على الإضافة وبذل المال كله."
      },
      {
        q: "(Al-Baqarah : 1-5) لِمَ عبر عن إنزال القرآن بلفظ الماضي، مع أن بعضه لم ينزل بعد؟",
        a: "التعبير بالماضي في (بما أُنزِلَ):\nلاعتبار تسمية الكل باسم البعض فيكون مجازاً، أو تنزيلاً للمنتظر المتوقع منزلة الواقع الحاصل, فيكون استعارة باعتبار تشبيه غير المتحقق بالمتحقق."
      },
      {
        q: "(Al-Baqarah : 1-5) لماذا توسط حرف العطف بين 'اولئك' الأولى و 'أولئك' الثانية؟",
        a: "سر توسط حرف العطف:\nلأن الجملتين مختلفتان باختلاف المسندين وإن تناسبتا تعلقاً، فهما مختلفتان مفهوماً ووجوداً ومقصوداً (جملة الهدى وجملة الفلاح)."
      },
      {
        q: "(Al-Baqarah : 1-5) ما أصل الفلاح؟",
        a: "أصل الفلاح في اللغة:\nهو القطع والشق ومنه سمي الحراث فلاحاً."
      },

      // --- FOTO 4: SURAH AL-BAQARAH (BAGIAN 2 - KISAH ADAM) ---
      {
        q: "(Al-Baqarah : 30-34) ما إعراب 'إذ' في قوله تعالى: 'وإذ قال ربك للملائكة'؟",
        a: "إعراب (إذْ):\nتأتي بمعنى فعل الأمر (اذكُرْ)، وقيل: إن لفظة 'إذ' هنا زائدة لا محل لها."
      },
      {
        q: "(Al-Baqarah : 30-34) اذكر أقوال العلماء في حقيقة الملائكة؟",
        a: "حقيقة الملائكة عند الطوائف:\n- ذهب أكثر المسلمين إلى أنها: أجسام لطيفة شفافة.\n- ذهب الحكماء (الفلاسفة): جوهر مجرد مخالف للنفوس الناطقة في الحقيقة.\n- ذهبت طائفة من النصارى: هي النفوس الفاضلة المتصفة بفضائل العلم والعمل."
      },
      {
        q: "(Al-Baqarah : 30-34) ما معنى الخليفة، وما المراد به في الآية؟",
        a: "معنى الخليفة:\nهو من يخلف غيره وينوب عنه.\n\nالمراد به في الآية:\nهو آدم عليه السلام لأنه خليفة الله في أرضه، وكذا كل نبي من بعده يخلف في إقامة الحق، وقيل: المراد آدم وذريته جميعاً."
      },
      {
        q: "(Al-Baqarah : 30-34) ما المراد بالأسماء في قوله تعالى: 'وعلم آدم الأسماء كلها'؟",
        a: "المراد بالأسماء المعلمة:\nأسماء المسميات كلها، وقيل: اسم ما كان وما يكون إلى يوم القيامة، وقيل: صيغة كل شيء وذاته، وقال أهل التأويل: هي جميع اللغات."
      },
      {
        q: "(Al-Baqarah : 30-34) ما أصل كلمة آدم؟",
        a: "أصل اسم (آدم):\nهو اسم أعجمي، وقيل مشتق من 'الأُدْمَة' بمعنى السمرة، أو من 'الآدَمَة' (بفتح الدال) بمعنى الأُسْوَة، وقيل: مشتق من 'أديم الأرض' أي ظاهر وجهها وترابها."
      },
      {
        q: "(Al-Baqarah : 30-34) لِمَ قال الله عز وجل 'وعلم آدم الأسماء كلها ثم عرضهم'، ولم يقل: عرضها؟",
        a: "سر التعبير بضمير العقلاء (عرضهم):\nلأن الأسماء إذا جمعت وجمعت معها من يعقل ومن لا يعقل، يكنى عنها بلفظ من يعقل تغليباً. وقال مقاتل: الكناية والضمير هنا راجعة إلى الشخوص المعروضة."
      },
      {
        q: "(Al-Baqarah : 30-34) ما نوع الهمزة في قوله تعالى: 'ألم أقل لكم'؟",
        a: "نوع الهمزة في (أَلَمْ):\nهي للإنكار بمعنى النفي، ودخلت هنا على حرف الجحد والنفي (لم)، ونفي النفي أفاد الإثبات والتقرير القاطع."
      },

      // --- FOTO 5: SURAH AL-BAQARAH (BAGIAN 3 - AYAT AL-BIRR & QISAS) ---
      {
        q: "(Al-Baqarah : 177-179) اذكر أقوال العلماء في المراد بالخطاب في قوله تعالى: 'ليس البر أن تولوا وجوهكم قبل المشرق والمغرب'؟",
        a: "المراد بالخطاب وتوجيهه على قولين:\n١. الخطاب متوجه إلى: المسلمين وأهلي الكتابين (اليهود والنصارى) معاً.\n٢. وقال قوم: هو خطاب عام مطلق لهم وللمسلمين في شأن تحويل القبلة والجدال فيها."
      },
      {
        q: "(Al-Baqarah : 177-179) ما المراد بـ 'الكتاب' في الآية الكريمة (آية البر)؟",
        a: "المراد بـ (الكتاب):\nالكتب السماوية كلها إذا أُريد باللفظ الجنس والعموم، وإلا فالمراد به القرآن الكريم خاصة، والأول (إرادة الجنس) هو الأولى والأشمل."
      },
      {
        q: "(Al-Baqarah : 177-179) اذكر القراءات الواردة in قوله تعالى: 'ولكن البر من آمن بالله..'؟",
        a: "القراءات المتواترة في (ولكن البر):\n١. نافع وابن عامر: بكسر النون مخففة ورفع الراء (ولكنْ البرُّ).\n٢. الباقون: بنصب النون مشددة ونصب الراء (ولكنَّ البرَّ)."
      },
      {
        q: "(Al-Baqarah : 177-179) إلام يعود الضمير في قوله تعالى: 'وآتى المال على حبه'؟",
        a: "مرجع الضمير في الآية:\n- يعود الضمير للمؤتي.\n- وقيل: يعود الضمير لله تعالى (أي على حب الله عز وجل)."
      },
      {
        q: "(Al-Baqarah : 177-179) ما معنى: 'اليتيم'، 'المسكين'، 'ابن السبيل'، 'السائل'؟",
        a: "الحدود اللغوية والشرعية للأصناف:\n- اليتيم: هو الطفل الصغير الذي لا أب له ولم يبلغ.\n- المسكين: من له مال أو كسب يقع موقعاً من كفايته ولكنه لا يكفيه تمام الكفاية.\n- ابن سبيل: هو المسافر لملازمته الطريق، وقيل: هو الضيف ينزل بالرجل.\n- السائل: هو الطالب الذي ألجأته الحاجة والضرورة إلى السؤال والطلب."
      },
      {
        q: "(Al-Baqarah : 177-179) هل في المال حق سوى الزكاة؟",
        a: "حكم الصدقة بعد وجوب الزكاة:\nلا، لأن وجوب الزكاة المفروضة نسخ وجوب كل صدقة."
      },
      {
        q: "(Al-Baqarah : 177-179) ما سبب نزول قوله تعالى: 'يا أيها الذين آمنوا كتب عليكم القصاص في القتلى'؟",
        a: "سبب نزول آية القصاص:\nنزلت في حيين من أحياء العرب اقتتلوا وبغى بعضهم على بعض في الجاهلية قبل الإسلام بقليل."
      },
      {
        q: "(Al-Baqarah : 177-179) إلام يعود الضمير في قوله: 'فمن عفي له من أخيه شيء'، و 'أخيه'؟",
        a: "مرجع الضمير واللفظ:\nالمراد باللفظين والضمير هما: القاتل والمقتول."
      },
      {
        q: "(Al-Baqarah : 177-179) لم تعدّى 'عفا' باللام، مع أنه يتعدى بـ 'عن'؟",
        a: "الفعل 'عَفَا' يتعدى أصلًا بحرف الجر (عن) إلى الجاني وإلى الذنب، فإذا تعدى في الآية بـ (اللام) في قوله 'عُفي له'، فذلك ليتعدى وينصرف إلى الجاني والذنب معاً لإفادة الإسقاط والنفع."
      },
      {
        q: "(Al-Baqarah : 177-179) ذكر العلماء أن قوله تعالى: 'ولكم في القصاص حياة' كلام في غاية الفصاحة والجمال. بين ذلك من خلال دراستك؟",
        a: "لأن الله جعل الشيء محله وضده، وتنكير حياة مع تعريف القصاص؛ دليل على أن في هذا الحكم (القصاص) نوعاً من الحياة عظيماً وصيانة للدماء."
      },

      // --- FOTO 6: SURAH AL-BAQARAH (BAGIAN 4 - AYAT AL-KURSI & AL-RUSUL) ---
      {
        q: "(Al-Baqarah : 253-255) ما إعراب 'تلك الرسل'، ولم عبر بأداة البعد؟",
        a: "إعراب البلاغة في الآية:\n- الإعراب: (تلك) تعرب مبتدأ، و(الرسل) تعرب صفة للمبتدأ.\n- ser أداة البعد: التعبير بأداة البعد جاء إعلاماً ببعد مراتبهم الرفيعة وعلو منازلهم الشريفة، وأنها بالمحل السامي الذي لا ينال والمقام الذي لا يطال."
      },
      {
        q: "(Al-Baqarah : 253-255) ما مناسبة قوله تعالى: 'تلك الرسل' لما قبلها؟",
        a: "لما كان أكثر السورة الكريمة متوجهاً في الحديث عن بني إسرائيل، وأكثر السياق في أتباع موسى عليه السلام، ذكر الله وصفه هنا مع وصف نبينا محمد ﷺ بلا واسطة تفخيماً لشأن الرسالة."
      },
      {
        q: "(Al-Baqarah : 253-255) ما أسباب تفضيل سيدنا محمد صلى الله عليه وسلم على غيره من الأنبياء؟",
        a: "وجوه ودرجات تفضيله ﷺ:\nارتفاع درجاته ﷺ، وختم النبوة به، وكثرة الأتباع في الأزمان الطويلة، ونسخ جميع الشرائع السابقة بدينه، وكونه رحمة للعالمين، وتفضيل أمته على سائر الأمم، وكثرة المعجزات المستمرة الباقية وغير ذلك."
      },
      {
        q: "(Al-Baqarah : 253-255) اذكر مناسبة قوله تعالى: 'يا أيها الذين آمنوا أنفقوا مما رزقناكم' لما قبلها؟",
        a: "لما كان الاختلاف على الأنبياء والتكذيب سبباً موجباً للجهاد شرعاً، وكان عماد الجهاد وقوامه هو النفقة المالية، أتى التأكيد بلفظ الأمر بالإنفاق لما تقدم الحث عليه من أمر الجهاد."
      },
      {
        q: "(Al-Baqarah : 253-255) ما مراد بـ 'النفقة' في الآية الكريمة؟",
        a: "المراد بالنفقة في هذا الموضع قولان:\n- عند السدي: هي الزكاة المفروضة.\n- عند غيره من المفسرين: هي صدقة التطوع والنفقة العامة في وجوه الخير."
      },
      {
        q: "(Al-Baqarah : 253-255) ما معنى 'الخلة'، 'الشفاعة'؟",
        a: "- خُلَّة: صداقة تامة تنفع صاحبها.\n- شفاعة: الشفاعة الآتية من كبار الشفعاء لرفع العقوبة أو زيادة الدرجة."
      },
      {
        q: "(Al-Baqarah : 253-255) اذكر القراءات الواردة في قوله تعالى: 'لا بيع فيه ولا خلة ولا شفاعة'؟",
        a: "القراءات المتواترة وتوجيهها:\n١. ابن كثير وأبو عمرو: بالنصب وترك التنوين (لا بيعَ فيهِ ولا خلةَ ولا شفاعةَ).\n٢. الباقون: بالرفع والتنوين (لا بيعٌ فيهِ ولا خلةٌ ولا شفاعةٌ)."
      },
      {
        q: "(Al-Baqarah : 253-255) ما معنى: 'الحي'، 'القيوم'، 'السنة'، 'النوم'؟",
        a: "صفات الذات في آية الكرسي:\n- الحي: هو الدائم البقاء أزلاً وأبداً.\n- القيوم: هو الدائم القيام بتدبير الخلق وحفظهم ورزقهم.\n- السِّنَة: هو ما يتقدم النوم من الفتور.\n- النوم: حالة طبيعية تعرض للحيوان من استرخاء أعصاب الدماغ بسبب رطوبات الأبخرة المتصاعدة."
      },
      {
        q: "(Al-Baqarah : 253-255) لِمَ قدَّم السنة على النوم؟",
        a: "لترتيب الوجود الفعلي؛ إذ إن وجود 'السنة' وحصول فتورها سابق في الترتيب الطبيعي على وجود وحصول 'النوم'."
      },
      {
        q: "(Al-Baqarah : 253-255) اذكر أقوال العلماء في معنى 'الكرسي'؟",
        a: "المراد بالكرسي عند المفسرين:\n- الحسن: هو العرش نفسه.\n- أبو هريرة: موضع أمام العرش العظيم.\n- وقيل: هو علمه المحيط، وقيل: هو تصوير لعظمته سبحانه وتمثيل مجرد، وقيل: ملكه وسلطانه."
      },
      {
        q: "(Al-Baqarah : 253-255) اذكر بعض الأحاديث الواردة في فضل آية الكرسي؟",
        a: "الأحاديث والروايات في فضلها:\n١. ما رواه الإمام مسلم في صحيحه.\n٢. ما رواه النسائي وابن حبان وغيرهما.\n٣. ما رواه البيهقي."
      },

      // --- FOTO 7: SURAH ALI 'IMRAN ---
      {
        q: "(Ali 'Imran : 133-135) قال تعالى (وسارعوا إلى مغفرة من ربكم وجنة عرضها السماوات والأرض أعدت للمتقين) ما معنى وسارعوا؟ وما القراءات الواردة في قوله (وسارعوا)؟ ولم جمعت السماوات وأفردت الأرض؟",
        a: "تفسير آية آل عمران وقراءتها:\n- معنى وسارعوا: بادروا وأقبلوا.\n\nالقراءات السبعية:\n١. نافع وابن عامر: بغير واو قبل السين (سارعوا).\n٢. الباقون: بإثبات واو العطف قبل السين (وسارعوا).\n\nسبب الجمع والإفراد:\nلأن السماوات طبقات وأنواع، بخلاف الأرض فإنها نوع وطبقة واحدة."
      },
      {
        q: "(Ali 'Imran : 133-135) اذكر من السنة النبوية ما يدل على عظم فضيلة كظم الغيظ؟",
        a: "روايات فضل كظم الغيظ الثابتة:\n١. ما أخرجه أبو داود والترمذي وابن ماجه والإمام أحمد في مسنده.\n٢. ما أخرجه أبو داود منفرداً.\n٣. ما أخرجه الإمام البخاري والإمام مسلم في الصحيحين."
      },
      {
        q: "(Ali 'Imran : 133-135) اذكر الروايات الواردة في سبب نزول قوله تعالى (والذين إذا فعلوا فاحشة أو ظلموا أنفسهم ذكروا الله....) الآية؟",
        a: "سبب نزول الآية بأقوال المفسرين:\n- عطاء: نزلت في شأن أبي سعيد التمار رضي الله عنه.\n- مقاتل والكلبي: نزلت عندما آخى رسول الله ﷺ بين رجلين، أحدهما من الأنصار والآخر من بني ثقيف."
      },

      // --- FOTO 8: SURAH AN-NISA ---
      {
        q: "(An-Nisa : 27-32) من المراد بالذين يتبعون الشهوات في قوله تعالى (ويريد الذين يتبعون الشهوات أن تميلوا ميلاً عظيماً)؟",
        a: "أقوال المفسرين في تحديدهم:\n- السدي: هم اليهود والنصارى.\n- قال بعض المفسرين: هم المجوس.\n- مجاهد: هم الزناة."
      },
      {
        q: "(An-Nisa : 27-32) ورد عن ابن عباس رضي الله عنهما: أن هناك ثمان آيات في سورة النساء خير لهذه الأمة... اذكر هذه الآيات الكريمة؟",
        a: "الآيات الثمان المأثورة عن ابن عباس هي:\nالآية رقم ٢٦، والآية ٢٧، والآية ٢٨، والآية ٣١، والآية ٤٨، والآية ٤٠، والآية ١١٠، والآية ١٤٧ من سورة النساء."
      },
      {
        q: "(An-Nisa : 27-32) ما نوع الاستثناء في قوله تعالى (إلا أن تكون تجارة عن تراض منكم) ، وما معنى قوله (ولا تقتلوا أنفسكم) ، وما الدليل عليه؟",
        a: "- نوع الاستثناء: استثناء منقطع.\n- معنى ولا تقتلوا أنفسكم: لا تقتلوا أنفسكم بارتكاب وتناول ما يؤدي إلى هلاكها في الدنيا والآخرة.\n- قول الحسن: لا تقتلوا إخوانكم.\n- وقيل في المعنى: لا يقتل الرجل نفسه حقيقة كفعل بعض الجهلة.\n\nالأدلة الثابتة والأثر المروي:\n١. ما أخرجه الإمام مسلم والطبراني.\n٢. ما أخرجه الإمام البخاري في صحيحه."
      },
      {
        q: "(An-Nisa : 27-32) ما المراد بالكبيرة في قوله تعالى (إن تجتنبوا كبائر ما تنهون عنه...)؟ وما القراءات الواردة في قوله (وندخلكم مدخلاً)？",
        a: "حد الكبيرة والقراءات:\n- تعريف الكبيرة وتحديدها:\n١. فسرها جماعة: هي كل ما لحق صاحبها وعيد شديد بنص كتاب أو سنة، وهذا القول أولى.\n٢. جماعة أخرى: هي المعصية الكبيرة الموجبة للحد الشرعي في الدنيا.\n٣. إمام الحرمين: هي كل جريمة تُعلم بقلة اكتراث مرتكبها بالدين.\n٤. سفيان الثوري: هي ما كان بينك وبين العباد من المظالم.\n\nالقراءات الواردة في (مُدْخلاً):\n- نافع: بفتح الميم (مَدْخلاً).\n- الباقون: بضم الميم (مُدْخَلاً)."
      },
      {
        q: "(An-Nisa : 27-32) اذكر ما دل عليه قوله تعالى (واسألوا الله من فضله)؟",
        a: "ما دلت عليه الآية الكريمة:\nدلت على النهي القاطع عن التمني بما أيدي الناس وحسدهم، والأمر بالتوجه والسؤال إلى الله وحده في كل ما يحتاج إليه العبد من خيري الدنيا والآخرة."
      },

      // --- FOTO 9 & 10: SURAH AL-MA'IDAH (BAGIAN 1 & 2 - DIANGGAP SATU PAKET) ---
  {
    q: "(Al-Ma'idah : 6-10) قوله تعالى 'يأيها الذين آمنوا إذا قمتم إلى الصلوة...' لم عبر عن إرادة الفعل بالفعل المسبب عنها، وما الذي يدل عليه ظاهر الآية وما الدليل عليه، وما المعنى العام للآية الكريمة؟",
    a: "توجيه آية الوضوء:\n- سر التعبير بـ (قمتم): للإيجاز والتنبيه البلاغي على أن من أراد العبادة ينبغي له أن يبادر إليها.\n\n- ظاهر الآية والنسخ:\nيدل ظاهر اللفظ على وجوب الوضوء على كل قائم إلى الصلاة مطلقاً وإن لم يكن محدثاً.\n\n- الدليل والعمل:\nانعقد الإجماع الفقهي فصدَّ وصرف عن وجوبه على كل قائم إن كان طاهرا. وما أخرجه الإمام أحمد والترمذي في الآثار؛ فقيل: أُريد به التقييد بالحدث، وقيل: الأمر فيه هنا للندب، وقيل: كان ذلك واجباً أول الأمر ثم نُسخ."
  },
  {
    q: "(Al-Ma'idah : 6-10) ما المعنى المقصود من قوله تعالى 'فاغسلوا وجوهكم'؟",
    a: "المعنى الفقهي للغسل:\nالمعنى المقصود هو إمرار الماء وجريانه صراحة على الوجه."
  },
  {
    q: "(Al-Ma'idah : 6-10) اذكر صفة وضوء النبي ﷺ وما الدليل على ذلك، وما نوع الباء في قوله تعالى 'وامسحوا برؤوسكم'؟",
    a: "صفة المسح ونوع الباء شافعياً:\n- الأدلة المعتمدة: الحديث الثاني والثالث من كتاب 'أحاديث مختارة من كتابي الطهارة والصلاة' (في كتاب الحديث التحليلي).\n\n- نوع الباء في (برؤوسكم):\nقاعدة الحرف: إذا دخلت الباء على متعدد في النظم تكون دالة على 'التبعيض'، وإذا دخلت على غير متعدد تكون دالة على 'الإلصاق'."
  },
  {
    q: "(Al-Ma'idah : 6-10) بين القراءات الواردة في قوله تعالى 'وأرجلكم' مع التوجيه لكل قراءة؟",
    a: "قراءات وتوجيه (وأرجلكم):\n١. نافع وابن عامر وحفص والكسائي: بنصب اللام (وأرجلَكم) عطفاً على المغسول وهو 'وجوهكم'، وقيل: عطفاً على 'أيديكم'.\n٢. الباقون: بكسر وجر اللام (وأرجلِكم) على الجار والمجاورة اللفظية؛ ومنهم من وجّه العطف على المجرور في قراءة الجر ليفيد حكم 'مسح الخف'، والعطف على المنصوب ليفيد حكم 'غسل الرجل' المجردة منه."
  },
  {
    q: "(Al-Ma'idah : 6-10) لم فصل بين الأيدي والأرجل المغسولة بالرأس الممسوح فيه؟",
    a: "فائدة قطع النظير وعطفه:\nجاء هذا الفصل دليلاً واضحاً وبرهاناً فقهياً على وجوب 'الترتيب' في أعمال الطهارة."
  },
  {
    q: "(Al-Ma'idah : 6-10) ما معنى قوله 'وإن كنتم جنباً فاطهروا' ولم أطلق هنا ولم يخص الأعضاء كما في الوضوء؟",
    a: "فقه غسل الجنابة:\n- المعنى: وإن كنتم جنباً من جماع أو غير ذلك فاطهروا بالكامل وعليكم الغسل.\n- سبب الإطلاق وترك التخصيص: لأن الغسل يوجب تعميم وتطهير جميع البدن بلا استثناء."
  },
  {
    q: "(Al-Ma'idah : 6-10) ما المعنى المقصود من قوله 'أو جاء أحد منكم من الغائط' وما الحكمة في ذلك؟",
    a: "المعنى والحكمة الأدبية البلاغية:\n- أصل الغائط لغة: هو الموضع المطمئن المنخفض من الأرض الذي يقضي فيه الإنسان حاجته .\n- الحكمة من الكناية: التنبيه على شدة عجز الإنسان وحاجته البيلوجية؛ ليكف عن إعجابه بنفسه وكبره وترفعه ونحوه."
  },
  {
    q: "(Al-Ma'idah : 6-10) قوله تعالى 'أو لمستم النساء فلم تجدوا ماء فتيمموا صعيداً طيباً فامسحوا بوجوهكم وأيديكم منه' ما القراءات الواردة في قوله 'أو لمستم النساء' وما معنى 'فلم تجدوا ماء' ، 'فتيمموا' ، 'صعيداً' ، 'طيباً' ، ومانوع الباء في قوله 'فامسحوا بوجوهكم وأيديكم منه' ، وما فائدة التكرير هنا؟",
    a: "تفسير ألفاظ التيمم وقراءتها:\n- القراءات في (لمستم): حمزة والكسائي قراءتها بلا ألف (لَمَسْتم)، والباقون بالألف (لامَسْتم).\n- فلم تجدوا ماء: عدم وجود الماء بعد طلبه حقيقة لفقده حساً، أو معنى بعجزه عن استعماله لمرض ونحوه.\n- فتيمموا: اقصدوا.\n- صعيداً: تراباً.\n- طيباً: طاهراً خالصاً.\n- نوع الباء في (بوجوهكم): تفيد الإلصاق.\n- فائدة التكرار: لاتصال الكلام في بيان أنواع الطهارة."
  },
  {
    q: "(Al-Ma'idah : 6-10) أذكر المعنى المراد من قوله 'ما يريد الله ليجعل عليكم من حرج ولكن يريد ليطهركم وليتم نعمته عليكم لعلكم تشكرون'？",
    a: "ما يريد الله ليجعل عليكم في الدين وأحكامه من ضيق أو مشقة بما فرض عليكم من الطهارة، ولكن يريد ليطهركم من الأحداث والذنوب، وليتم نعمته الجليلة عليكم ببيان شرائع الدين القويمة لعلكم تشكرون نعمه العظيمة فيثيبكم عليها."
  },
  {
    q: "(Al-Ma'idah : 6-10) قوله تعالى 'واذكروا نعمة الله عليكم وميثقه الذي واثقكم به إذ قلتم سمعنا وأطعنا واتقوا الله إن الله عليم بذات الصدور' ما معنى قوله 'واذكروا نعمة الله'، ولما قال تعالى 'نعمة الله' ولم يقل 'نعم الله'؟",
    a: "- المعنى: الأمر بذكر نعمة الله في هدايته الخلق إلى الإسلام وفي غير ذلك من النعم، ليذكر المنعم من ذكره ويرغبه في شكره تعالى.\n- سبب الإفراد (نعمة) دون الجمع: لأن هذا الجنس من النعم لا يقدر عليه إلا الله وحده، وللتأمل في هذا النوع بأنه ممتاز عن نعمة غيره.\n\nأصل والميثاق:\n- الميثاق لغة: عقدة الوثيق.\n- المراد به: عقدة الوثيق الذي واثقكم به بواسطة رسول الله ﷺ حين مبايعته ليلة العقبة، والتزام الذي يبايعونه به."
  },
  {
    q: "(Al-Ma'idah : 6-10) قوله تعالى 'واذكروا نعمة الله' يشعر بسبق النسيان فكيف يعقل نسيانها مع أنها متواترة متوالية علينا في جميع الساعات والأوقات؟",
    a: "إن النعم بكثرتها السابغة وتعاظم تعاقبها واستمرارها على العبد، صارت لديه كالأمر المعتاد المستقر، وهذا الاعتياد البشري يصبح سبباً لوقوعها في محل الغفلة والنسيان العملي."
  },
  {
    q: "(Al-Ma'idah : 6-10) قوله تعالى 'يأيها الذين آمنوا كونوا قوامين لله شهداء بالقسط ولا يجرمنكم شنآن قوم على ألا تعدلوا اعدلوا هو أقرب للتقوى واتقوا الله إن الله خبير بما تعملون' ما المراد 'قوامين لله'، 'شهداء'، 'بالقسط' و 'ولا يجرمنكم'، 'شنآن'؟ وما فائدة الإشارة في الآية الكريمة؟",
    a: "-  قوامين لله: مجتهدين في القيام بحقوقه تعالى.\n- شهداء: متيقظين محضرين أفهامكم غاية الإحضار.\n- بالقسط: العدل المستقر.\n- معنى ولا يجرمنكم: ولا يحملنكم.\n- معنى شنآن: شدة بغض.\n\nفائدة الإشارة في الآية:\nالإشارة متوجهة إلى التعظيم لأمر الله سبحانه، والشفقة على خلق الله جميعاً."
  },
  {
    q: "(Al-Ma'idah : 6-10) قوله تعالى 'وعد الله الذين آمنوا وعملوا الصالحات لهم مغفرة وأجر عظيم' اذكر إعراب الآية الكريمة تفصيلاً؟",
    a: "الإعراب التفصيلي المعتمد للآية:\n- وعدَ: فعل ماضٍ مبني على الفتح.\n- اللهُ: فاعل مرفوع وعلامة رَفعه الضمة الظاهرة.\n- الذينَ: اسم موصول مبني على الفتح في محل نصب مفعول به أول.\n- آمنوا: صلة الموصول، فعل ماضٍ مبني على الضم لاتصاله بواو الجماعة، والواو فاعل.\n- و: حرف عطف مبني على الفتح.\n- عملوا: معطوف على آمنوا، فعل ماضٍ مبني على الضم، والواو فاعل.\n- الصالحاتِ: مفعول به منصوب وعلامة نصبه الكسرة نيابة عن الفتحة لأنه جمع مؤنث سالم.\n- لهم مغفرة وأجر عظيم: جملة استئنافية (وقيل: هي في محل نصب المفعول به الثاني لـ وعد).\n\nتفصيل جملة (لهم مغفرة):\n- لـ: حرف جر مبني على الفتح، و(هم) ضمير متصل مبني على السكون في محل جر.\n- لهم: جار ومجرور خبر مقدم.\n- مغفرةٌ: مبتدأ مؤخر مرفوع وعلامة رفعه الضمة الظاهرة.\n- و: حرف عطف مبني على الفتح.\n- أجرٌ: معطوف على مغفرة مرفوع وعلامة رفعه الضمة.\n- عظيمٌ: نعت (صفة) لـ أجر مرفوع وعلامة رفعه الضمة الظاهرة."
  },
  {
    q: "(Al-Ma'idah : 6-10) ما معنى قوله تعالى 'والذين كفروا وكذبوا بآياتنا أولئك أصحاب الجحيم'؟",
    a: "الذين كفروا بالله وكذبوا بآيات القرآن الشريفة، سوف يلقون في نار جهنم التي اشتد توقدها واشتد احمرارها (الجحيم)، ثم يلازمونها ملازمة أبدية فلا ينفكون عنها عقاباً."
  },

  // --- FOTO 11: SURAH AL-AN'AM ---
  {
    q: "هل سورة الأنعام مكية، أم مدنية، وما الدليل على ذلك، وما عدد كلماتها، وحروفها؟",
    a: "سورة الأنعام مكية بالاجماع والاتفاق.\n\n• الدليل: ما رواه الطبراني والهيثمي، وقال الكلبي: \"نزلت بمكة إلا ست آيات عن أبي صالح عن ابن عباس\".\n• عدد كلماتها: ٣٠٥٢ كلمة.\n• عدد حروفها: ١٢٤٢٢ حرفاً."
  },
  {
    q: "اختصت سورة الأنعام بنوعين من الفضيلة اذكرهما.",
    a: "اختصت سورة الأنعام بفضيلتين عظيمتين وهما:\n\n١. أنها نزلت جملة واحدة (دفعة واحدة).\n٢. أنه شيعها ونزل معها سبعون ألفاً من الملائكة."
  },
  {
    q: "ما معنى الحمد، ولم جاء على صيغة الخبر وفيه معنى الأمر؟",
    a: "• معنى الحمد: هو الثناء باللسان على الجميل الاختياري على قصد التبجيل والتعظيم.\n• سبب مجيئه على صيغة الخبر: جاء بلفظ الخبر وفيه معنى الأمر لأنه أبلغ في البيان، ليجمع الأمرين معاً: الصيغة الخبرية والدلالة الإنشائية."
  },
  {
    q: "لم خص السماوات والأرض بالذكر؟",
    a: "خص الله عز وجل السماوات والأرض بالذكر في هذا الموضع لأنهما أعظم المخلوقات المشاهدة للبشر، والدالة بوضوح على كمال قدرته وحكمته."
  },
  {
    q: "ما المراد بالظلمة، وما متعلق الباء في قوله \"ثُمَّ الَّذِينَ كَفَرُوا بِرَبِّهِمْ يَعْدِلُونَ\"، وما معنى \"ثم\"؟",
    a: "• المراد بالظلمة: الضلال.\n• متعلق الباء: متعلق بـ \"يعدلون\"، أو غلى قوله: الحمد لله.\n• معنى \"ثم\": تفيد استبعاد عدولهم وإشراكهم بالله بعد وضوح آيات قدرته."
  },
  {
    q: "علام عطف قوله \"ثُمَّ الَّذِينَ كَفَرُوا بِرَبِّهِمْ يَعْدِلُونَ\"؟",

        ar: { subtitle: " منصة تدريب الذاكرة والمراجعة", btnStart: "ابدأ التدريب", btnReveal: "إظهار الإجابة", lAns: "الإجابة الشارحة:", btnWrong: "نسيت", btnCorrect: "حفظت", resTitle: "النتيجة النهائية", btnRestart: "العودة للقائمة", countMsg: (n) => `جاهز لـ ${n} من الأسئلة المقررة.`, tOn: "تفعيل المؤقت", tSec: "المدة (ثانية):", fixedLabel: "المادة :" },
        en: { subtitle: "Memory Training & Self-Murojaah", btnStart: "Start Random Practice", btnReveal: "Show Answer", lAns: "Explanation Answer:", btnWrong: "Forgot", btnCorrect: "Memorized", resTitle: "Final Result", btnRestart: "Back to Menu", countMsg: (n) => `${n} exam questions ready to test.`, tOn: "Enable Timer", tSec: "Duration (sec):", fixedLabel: "Current Subject:" }
    };

    function toggleLangMenu() {
        document.getElementById("langDropdown").classList.toggle("show");
    }

    function changeLang(lang) {
        setLang(lang);
        document.getElementById("current-lang-btn").innerText = "🌐 " + lang.toUpperCase();
        document.getElementById("langDropdown").classList.remove("show");
    }

    window.addEventListener('click', function(event) {
        if (!event.target.matches('.dropbtn')) {
            const dropdowns = document.getElementsByClassName("dropdown-content");
            for (let i = 0; i < dropdowns.length; i++) {
                const openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('show')) {
                    openDropdown.classList.remove('show');
                }
            }
        }
    });

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('thoriqDarkMode', isDark);
        document.getElementById('dark-toggle').innerText = isDark ? '☀️' : '🌙';
    }

    function setLang(lang) {
        document.body.setAttribute('lang', lang);
        const t = i18n[lang];
        document.getElementById('txt-subtitle').innerText = t.subtitle;
        document.getElementById('txt-fixed-label').innerText = t.fixedLabel;
        document.getElementById('start-btn').innerText = t.btnStart;
        document.getElementById('reveal-btn').innerText = t.btnReveal;
        document.getElementById('txt-label-ans').innerText = t.lAns;
        document.getElementById('txt-btn-wrong').innerText = t.btnWrong;
        document.getElementById('txt-btn-correct').innerText = t.btnCorrect;
        document.getElementById('txt-res-title').innerText = t.resTitle;
        document.getElementById('txt-btn-restart').innerText = t.btnRestart;
        document.getElementById('txt-timer-on').innerText = t.tOn;
        document.getElementById('txt-timer-sec').innerText = t.tSec;
        
        document.getElementById('count-info').innerText = t.countMsg(DAFTAR_SOAL.length);
    }

    let currentQuestions = [], currentIdx = 0, score = 0, timerInterval;

    function startTimer() {
        const isTimerOn = document.getElementById('timer-toggle').checked;
        const duration = parseInt(document.getElementById('timer-duration').value) || 30;
        if (!isTimerOn) { document.getElementById('timer-container').style.display = 'none'; return; }

        let timeLeft = duration;
        document.getElementById('timer-container').style.display = 'block';
        const bar = document.getElementById('timer-bar');
        bar.style.transition = 'none'; bar.style.width = "100%"; bar.style.background = "var(--accent)";
        setTimeout(() => { bar.style.transition = 'width 1s linear'; }, 50);

        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            const width = (timeLeft / duration) * 100;
            bar.style.width = width + "%";
            if (timeLeft <= 5) bar.style.background = "#e74c3c";
            if (timeLeft <= 0) { clearInterval(timerInterval); revealAnswer(); }
        }, 1000);
    }

    function startQuiz() {
        currentQuestions = [...DAFTAR_SOAL].sort(() => Math.random() - 0.5);
        currentIdx = 0; score = 0;
        document.getElementById('setup-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const data = currentQuestions[currentIdx];
        document.getElementById('progress').innerText = `${currentIdx + 1} / ${currentQuestions.length}`;
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('a-text').innerText = data.a;
        document.getElementById('answer-container').style.display = 'none';
        document.getElementById('eval-section').style.display = 'none';
        document.getElementById('reveal-btn').style.display = 'block';
        startTimer();
    }

    function revealAnswer() {
        clearInterval(timerInterval);
        document.getElementById('answer-container').style.display = 'block';
        document.getElementById('eval-section').style.display = 'grid';
        document.getElementById('reveal-btn').style.display = 'none';
    }

    function processResult(isCorrect) {
        if(isCorrect) score++;
        currentIdx++;
        if(currentIdx < currentQuestions.length) showQuestion();
        else {
            document.getElementById('quiz-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            document.getElementById('score-text').innerText = `${score} / ${currentQuestions.length}`;
        }
    }

    window.onload = () => {
        if (localStorage.getItem('thoriqDarkMode') === 'true') {
            document.body.classList.add('dark-mode');
            document.getElementById('dark-toggle').innerText = '☀️';
        }
        document.getElementById('display-maddah-name').innerText = NAMA_MADDAH;
        setLang('ar');
    };

</script>
</body>
